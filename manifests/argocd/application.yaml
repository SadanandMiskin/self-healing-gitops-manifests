apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-healing-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sadanandmiskin/self-healing-gitops-manifests.git
    targetRevision: main
    path: manifests/apps/self-healing-api
  destination:
    server: https://kubernetes.default.svc
    namespace: self-healing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
