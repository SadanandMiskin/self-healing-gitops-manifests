apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-api
  namespace: self-healing
  labels:
    app: self-healing-api
  annotations:
    self-healing.dev/allowed-fix: "add REQUIRED_GREETING env only"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-healing-api
  template:
    metadata:
      labels:
        app: self-healing-api
    spec:
      containers:
        - name: api
          image: docker.io/sadsmiskin/self-healing-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: info
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
